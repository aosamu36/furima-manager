<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="フリマ管理">
<meta name="theme-color" content="#ffffff">
<title>フリマ売上管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
–accent: #ff6b35;
–green: #06d6a0;
–bg: #f2f2f7;
–card: #ffffff;
–border: #e5e5ea;
–text: #1a1a1a;
–muted: #8e8e93;
–nav-h: 60px;
–header-h: 56px;
}

body {
font-family: -apple-system, ‘Hiragino Sans’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100dvh;
padding-top: calc(var(–header-h) + env(safe-area-inset-top));
padding-bottom: calc(var(–nav-h) + env(safe-area-inset-bottom));
-webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 200;
height: calc(var(–header-h) + env(safe-area-inset-top));
padding-top: env(safe-area-inset-top);
background: rgba(255,255,255,0.92);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: space-between;
padding-left: 18px;
padding-right: 18px;
}
.header-title { font-size: 17px; font-weight: 700; }
.db-badge {
font-size: 11px; font-weight: 600;
padding: 3px 10px; border-radius: 20px;
border: 1px solid;
}
.db-ok  { color: var(–green); border-color: rgba(6,214,160,0.4); background: rgba(6,214,160,0.08); }
.db-err { color: var(–accent); border-color: rgba(255,107,53,0.4); background: rgba(255,107,53,0.08); }
.db-connecting { color: var(–muted); border-color: var(–border); background: transparent; }

/* ── NAV ── */
.nav {
position: fixed;
bottom: 0; left: 0; right: 0;
z-index: 200;
height: calc(var(–nav-h) + env(safe-area-inset-bottom));
padding-bottom: env(safe-area-inset-bottom);
background: rgba(255,255,255,0.95);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border-top: 1px solid var(–border);
display: flex;
}
.nav-btn {
flex: 1;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 3px;
background: none; border: none;
font-size: 10px; color: var(–muted);
font-family: inherit; cursor: pointer;
transition: color 0.15s;
}
.nav-btn.active { color: var(–accent); }
.nav-icon { font-size: 22px; line-height: 1; }

/* ── PAGE ── */
.page { display: none; padding: 16px; }
#page-add { padding-top: 20px; }
.page.active { display: block; }

/* ── CARDS ── */
.card {
background: var(–card);
border-radius: 14px;
padding: 16px;
margin-bottom: 12px;
border: 1px solid var(–border);
}

/* ── HOME ── */
.month-nav {
display: flex;
align-items: center; justify-content: space-between;
margin-bottom: 14px;
}
.month-btn {
width: 36px; height: 36px;
border-radius: 50%;
border: 1px solid var(–border);
background: var(–card);
font-size: 16px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
}
.month-label { font-size: 18px; font-weight: 700; }

.stats-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-bottom: 12px;
}
.stat-card {
background: var(–card);
border-radius: 14px;
padding: 14px;
border: 1px solid var(–border);
}
.stat-card.pink  { background: #fff5f5; border-color: #ffd6d6; }
.stat-card.mint  { background: #f0fdf9; border-color: #b3f0e3; }
.stat-label { font-size: 11px; color: var(–muted); margin-bottom: 6px; }
.stat-value { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }

.section-label {
font-size: 12px; font-weight: 700;
color: var(–muted); text-transform: uppercase;
letter-spacing: 0.8px; margin-bottom: 10px;
}
.app-row {
display: flex; justify-content: space-between; align-items: center;
padding: 10px 0; border-bottom: 1px solid var(–border);
}
.app-row:last-child { border-bottom: none; }
.app-name { font-size: 14px; font-weight: 600; }
.app-sale { font-size: 14px; font-weight: 700; text-align: right; }
.app-profit { font-size: 11px; color: var(–green); text-align: right; }

.item-card {
display: flex; align-items: center;
gap: 12px; padding: 12px;
background: var(–card);
border: 1px solid var(–border);
border-radius: 12px;
margin-bottom: 8px;
}
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-sub  { font-size: 11px; color: var(–muted); margin-top: 3px; }
.item-price { text-align: right; flex-shrink: 0; }
.item-sale-val { font-size: 15px; font-weight: 700; }
.item-profit-val { font-size: 11px; color: var(–green); margin-top: 2px; }
.item-del {
background: none; border: none;
font-size: 18px; color: #ccc; cursor: pointer;
padding: 4px; flex-shrink: 0;
}

.tag {
display: inline-block; font-size: 10px;
padding: 1px 7px; border-radius: 20px; margin-right: 4px;
}
.tag-mercari { background: #ffe8ec; color: #e63262; }
.tag-rakuma  { background: #eeeaff; color: #6c5ce7; }
.tag-yahoo   { background: #fff0e0; color: #e67e00; }
.tag-paypay  { background: #e0f0ff; color: #0070cc; }
.tag-other   { background: #f0f0f0; color: #666; }

.empty { text-align: center; padding: 48px 20px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; color: var(–muted); line-height: 1.6; }

/* ── ADD FORM ── */
.upload-btn {
width: 100%;
padding: 20px;
background: #f9f9fb;
border: 2px dashed var(–border);
border-radius: 12px;
display: flex; align-items: center; justify-content: center; gap: 10px;
font-size: 14px; font-weight: 600; color: var(–muted);
cursor: pointer; margin-bottom: 16px;
transition: border-color 0.2s, background 0.2s;
}
.upload-btn:active { background: #f0f0f5; border-color: var(–accent); }
.upload-btn.analyzing { border-color: var(–accent); color: var(–accent); }

.form-row {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-bottom: 10px;
}
.form-group { margin-bottom: 10px; }
.form-label {
font-size: 11px; font-weight: 700;
color: var(–muted); text-transform: uppercase;
letter-spacing: 0.5px; margin-bottom: 6px;
display: block;
}
.form-input {
width: 100%; padding: 11px 12px;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 10px;
font-family: inherit; font-size: 15px;
color: var(–text); outline: none;
transition: border-color 0.15s, background 0.15s;
-webkit-appearance: none;
}
.form-input:focus {
border-color: var(–accent);
background: #fff;
}
.form-select {
width: 100%; padding: 11px 12px;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 10px;
font-family: inherit; font-size: 15px;
color: var(–text); outline: none;
-webkit-appearance: none;
}

.btn-save {
width: 100%; padding: 14px;
background: var(–accent);
color: #fff; border: none;
border-radius: 12px; font-family: inherit;
font-size: 16px; font-weight: 700;
cursor: pointer; margin-top: 8px;
transition: opacity 0.15s;
}
.btn-save:active { opacity: 0.8; }
.btn-save:disabled { background: var(–border); color: var(–muted); cursor: default; }

/* ── SETTINGS ── */
.settings-section { margin-bottom: 20px; }
.settings-title {
font-size: 13px; font-weight: 700;
color: var(–muted); text-transform: uppercase;
letter-spacing: 0.8px; margin-bottom: 12px;
}
.btn-primary {
width: 100%; padding: 13px;
background: var(–accent);
color: #fff; border: none;
border-radius: 11px; font-family: inherit;
font-size: 15px; font-weight: 700;
cursor: pointer; margin-top: 10px;
}
.btn-primary:active { opacity: 0.8; }
.settings-info {
font-size: 13px; color: var(–muted);
line-height: 1.8;
}
.settings-link { color: var(–accent); text-decoration: none; }

/* ── CHART ── */
.chart-wrap { position: relative; height: 220px; margin: 4px 0; }

/* ── TOAST ── */
.toast {
position: fixed;
bottom: calc(var(–nav-h) + env(safe-area-inset-bottom) + 12px);
left: 50%; transform: translateX(-50%) translateY(8px);
background: #333; color: #fff;
border-radius: 10px; padding: 10px 18px;
font-size: 13px; font-weight: 600;
opacity: 0; transition: all 0.25s;
pointer-events: none; white-space: nowrap; z-index: 300;
max-width: calc(100vw - 40px); text-align: center;
}
.toast.error { background: #e63262; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

</head>

<script>
// ── Supabase ──
let _sb = null;
function getClient() {
  const url = (localStorage.getItem('sb_url') || '').replace(/\/$/, '');
  const key = localStorage.getItem('sb_key') || '';
  if (!url || !key) return null;
  if (!_sb) _sb = window.supabase.createClient(url, key);
  return _sb;
}
async function dbGetAll() {
  const c = getClient(); if (!c) throw new Error('未設定');
  const { data, error } = await c.from('items').select('*').order('date', { ascending: false });
  if (error) throw error;
  return data;
}
async function dbInsert(item) {
  const c = getClient(); if (!c) throw new Error('未設定');
  const { error } = await c.from('items').insert(item);
  if (error) throw error;
}
async function dbDelete(id) {
  const c = getClient(); if (!c) throw new Error('未設定');
  const { error } = await c.from('items').delete().eq('id', id);
  if (error) throw error;
}

// ── State ──
let curYear = new Date().getFullYear(), curMonth = new Date().getMonth() + 1;
let chartInst = null;
const fmt = n => '¥' + Math.round(n).toLocaleString('ja-JP');

// ── Toast ──
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Nav ──
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'chart') renderChart();
  if (name === 'settings') renderSettings();
}

function changeMonth(d) {
  curMonth += d;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  if (curMonth < 1)  { curMonth = 12; curYear--; }
  renderHome();
}

// ── Home ──
async function renderHome() {
  document.getElementById('month-label').textContent = `${curYear}年${curMonth}月`;
  const st = document.getElementById('db-status');
  st.textContent = '接続中'; st.className = 'db-badge db-connecting';
  try {
    const all = await dbGetAll();
    const mi = all.filter(i => {
      const d = new Date(i.date);
      return d.getFullYear() === curYear && d.getMonth() + 1 === curMonth;
    });

    document.getElementById('total-sales').textContent  = fmt(mi.reduce((s,i)=>s+(+i.price||0),0));
    document.getElementById('total-profit').textContent = fmt(mi.reduce((s,i)=>s+(+i.profit||0),0));
    document.getElementById('total-fee').textContent    = fmt(mi.reduce((s,i)=>s+(+i.fee_amount||0),0));
    document.getElementById('month-count').textContent  = mi.length + '件';

    const appMap = {};
    mi.forEach(i => {
      if (!appMap[i.app]) appMap[i.app] = {sales:0,profit:0};
      appMap[i.app].sales  += +i.price || 0;
      appMap[i.app].profit += +i.profit || 0;
    });
    const bd = document.getElementById('app-breakdown');
    bd.innerHTML = Object.keys(appMap).length
      ? Object.entries(appMap).map(([app,s])=>`
        <div class="app-row">
          <div class="app-name">${app}</div>
          <div><div class="app-sale">${fmt(s.sales)}</div><div class="app-profit">利益 ${fmt(s.profit)}</div></div>
        </div>`).join('')
      : '<div style="color:var(--muted);font-size:13px">データなし</div>';

    const listEl = document.getElementById('item-list');
    if (!mi.length) {
      listEl.innerHTML = '<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">まだ記録がありません<br>＋から追加してね</div></div>';
    } else {
      listEl.innerHTML = mi.map(i => {
        const tagCls = i.app==='メルカリ'?'tag-mercari':i.app==='ラクマ'?'tag-rakuma':i.app==='ヤフオク'?'tag-yahoo':i.app==='PayPayフリマ'?'tag-paypay':'tag-other';
        const d = new Date(i.date);
        return `<div class="item-card">
          <div class="item-info">
            <div class="item-name">${i.name}</div>
            <div class="item-sub"><span class="tag ${tagCls}">${i.app}</span>${d.getMonth()+1}/${d.getDate()}</div>
          </div>
          <div class="item-price">
            <div class="item-sale-val">${fmt(+i.price||0)}</div>
            <div class="item-profit-val">+${fmt(+i.profit||0)}</div>
          </div>
          <button class="item-del" onclick="deleteItem('${i.id}')">🗑</button>
        </div>`;
      }).join('');
    }

    st.textContent = 'DB ✓'; st.className = 'db-badge db-ok';
  } catch(e) {
    st.textContent = 'エラー'; st.className = 'db-badge db-err';
    document.getElementById('item-list').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">接続エラー<br>⚙️設定を確認してください</div></div>';
  }
}

async function deleteItem(id) {
  if (!confirm('この記録を削除しますか？')) return;
  try { await dbDelete(id); renderHome(); toast('削除しました'); }
  catch(e) { toast('削除に失敗しました', 'error'); }
}

// ── Image Analysis ──
async function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const geminiKey = localStorage.getItem('gemini_key') || '';
  if (!geminiKey) {
    toast('⚙️設定からGemini APIキーを入力してください', 'error');
    return;
  }

  const btn = document.getElementById('upload-btn');
  btn.classList.add('analyzing');
  document.getElementById('upload-icon').textContent = '⏳';
  document.getElementById('upload-text').textContent = 'AI解析中...';

  try {
    const base64 = await new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.readAsDataURL(file);
    });

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: file.type, data: base64 } },
              { text: 'この取引画面の画像から情報を抽出してください。JSONのみ返してください。バッククォートや説明文は一切不要です。形式: {"name":"商品名","date":"YYYY-MM-DD","app":"メルカリ","price":数値,"fee_amount":数値,"shipping":数値,"profit":数値,"delivery_method":"配送方法","item_id":"商品ID"} 不明な値はnullにしてください。' }
            ]
          }],
          generationConfig: { temperature: 0 }
        })
      }
    );

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.candidates[0].content.parts[0].text
      .replace(/`{3}json|`{3}/g, '').trim();
    const p = JSON.parse(raw);

    if (p.name)            document.getElementById('f-name').value     = p.name;
    if (p.date)            document.getElementById('f-date').value     = p.date;
    if (p.app)             document.getElementById('f-app').value      = p.app;
    if (p.price != null)   document.getElementById('f-price').value    = p.price;
    if (p.fee_amount != null) document.getElementById('f-fee').value   = p.fee_amount;
    if (p.shipping != null) document.getElementById('f-shipping').value = p.shipping;
    if (p.profit != null)  document.getElementById('f-profit').value   = p.profit;
    if (p.delivery_method) document.getElementById('f-delivery').value = p.delivery_method;
    if (p.item_id)         document.getElementById('f-item-id').value  = p.item_id;

    toast('✅ 解析完了！内容を確認してね');
  } catch(err) {
    console.error(err);
    toast('解析失敗: ' + err.message, 'error');
  } finally {
    btn.classList.remove('analyzing');
    document.getElementById('upload-icon').textContent = '📷';
    document.getElementById('upload-text').textContent = '取引スクショをタップして選択';
  }
}

// ── Save Item ──
async function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('商品名を入力してください', 'error'); return; }
  const item = {
    id: Date.now().toString(),
    name,
    date:            document.getElementById('f-date').value,
    app:             document.getElementById('f-app').value,
    price:           +document.getElementById('f-price').value || 0,
    fee_amount:      +document.getElementById('f-fee').value || 0,
    shipping:        +document.getElementById('f-shipping').value || 0,
    profit:          +document.getElementById('f-profit').value || 0,
    cost:            +document.getElementById('f-cost').value || 0,
    delivery_method: document.getElementById('f-delivery').value,
    item_id:         document.getElementById('f-item-id').value,
  };
  try {
    await dbInsert(item);
    toast('✅ 保存しました！');
    ['f-name','f-price','f-fee','f-shipping','f-profit','f-cost','f-delivery','f-item-id'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  } catch(e) {
    toast('保存に失敗しました: ' + e.message, 'error');
  }
}

// ── Chart ──
async function renderChart() {
  try {
    const all = await dbGetAll();
    const monthly = {};
    all.forEach(i => {
      const d = new Date(i.date);
      const key = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;
      if (!monthly[key]) monthly[key] = {sales:0, profit:0};
      monthly[key].sales  += +i.price || 0;
      monthly[key].profit += +i.profit || 0;
    });
    const labels = Object.keys(monthly).sort().slice(-6);
    const salesData  = labels.map(k => monthly[k].sales);
    const profitData = labels.map(k => monthly[k].profit);
    const ctx = document.getElementById('sales-chart').getContext('2d');
    if (chartInst) chartInst.destroy();
    chartInst = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label:'売上', data: salesData,  backgroundColor:'rgba(255,107,53,0.7)' },
          { label:'利益', data: profitData, backgroundColor:'rgba(6,214,160,0.7)' }
        ]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'top' } } }
    });
  } catch(e) { toast('グラフ取得に失敗しました', 'error'); }
}

// ── Settings ──
function saveSettings() {
  const url    = document.getElementById('s-url').value.trim();
  const key    = document.getElementById('s-key').value.trim();
  const gemini = document.getElementById('s-gemini').value.trim();
  if (!url || !key) { toast('URLとキーを入力してください', 'error'); return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  if (gemini) localStorage.setItem('gemini_key', gemini);
  _sb = null;
  toast('✅ 設定を保存しました');
  renderSettings();
  renderHome();
}

async function renderSettings() {
  document.getElementById('s-url').value    = localStorage.getItem('sb_url') || '';
  document.getElementById('s-key').value    = localStorage.getItem('sb_key') || '';
  document.getElementById('s-gemini').value = localStorage.getItem('gemini_key') || '';
  document.getElementById('settings-url').textContent = localStorage.getItem('sb_url') || '未設定';
  try {
    const all = await dbGetAll();
    document.getElementById('settings-count').textContent = `件数：${all.length} 件`;
  } catch { document.getElementById('settings-count').textContent = '件数：接続エラー'; }
}

// ── Init ──
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
// Reset client to ensure fresh connection
_sb = null;
renderHome();
</script>
