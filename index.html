<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="決闘売上録">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icon.png">
<title>決闘売上録</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
–accent: #ff6b35;
–green: #06d6a0;
–bg: #f2f2f7;
–card: #ffffff;
–border: #e5e5ea;
–text: #1a1a1a;
–muted: #8e8e93;
–nav-h: 60px;
}

body {
font-family: -apple-system, ‘Hiragino Sans’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100dvh;
padding-top: calc(52px + env(safe-area-inset-top) + 8px);
padding-bottom: calc(var(–nav-h) + env(safe-area-inset-bottom) + 16px);
-webkit-font-smoothing: antialiased;
}

/* ── SPLASH ── */
.splash {
position: fixed;
top: 0; left: 0;
width: 100vw;
height: 100dvh;
z-index: 999;
background: #000;
opacity: 1;
transition: opacity 0.7s ease;
pointer-events: auto;
}
.splash.hide { opacity: 0; pointer-events: none; }
.splash img {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
object-fit: cover;
object-position: center center;
}

/* ── HEADER ── */
.header {
position: fixed; top: 0; left: 0; right: 0; z-index: 200;
background: rgba(255,255,255,0.97);
backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
border-bottom: 1px solid var(–border);
display: flex; align-items: center; justify-content: space-between;
padding: env(safe-area-inset-top) 18px 0;
min-height: calc(52px + env(safe-area-inset-top));
}
.header-logo { height: 30px; width: auto; object-fit: contain; filter: drop-shadow(0 1px 4px rgba(255,180,0,0.4)); }
.db-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; border: 1px solid; }
.db-ok   { color: var(–green);  border-color: rgba(6,214,160,0.4);  background: rgba(6,214,160,0.08); }
.db-err  { color: var(–accent); border-color: rgba(255,107,53,0.4); background: rgba(255,107,53,0.08); }
.db-wait { color: var(–muted);  border-color: var(–border);        background: transparent; }

/* ── NAV ── */
.nav {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
height: calc(var(–nav-h) + env(safe-area-inset-bottom));
padding-bottom: env(safe-area-inset-bottom);
background: rgba(255,255,255,0.97);
backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
border-top: 1px solid var(–border);
display: flex;
}
.nav-btn {
flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
background: none; border: none; font-size: 10px; color: var(–muted); font-family: inherit; cursor: pointer;
}
.nav-btn.active { color: var(–accent); }
.nav-icon { font-size: 22px; line-height: 1; }

/* ── PAGE ── */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* ── CARD ── */
.card { background: var(–card); border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid var(–border); }

/* ── HOME ── */
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.month-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(–border); background: var(–card); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.month-label { font-size: 18px; font-weight: 700; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card { background: var(–card); border-radius: 14px; padding: 14px; border: 1px solid var(–border); }
.stat-card.pink { background: #fff5f5; border-color: #ffd6d6; }
.stat-card.mint { background: #f0fdf9; border-color: #b3f0e3; }
.stat-label { font-size: 11px; color: var(–muted); margin-bottom: 6px; }
.stat-value { font-size: 22px; font-weight: 800; }

.section-label { font-size: 12px; font-weight: 700; color: var(–muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }

.app-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(–border); }
.app-row:last-child { border-bottom: none; }

.item-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(–card); border: 1px solid var(–border); border-radius: 12px; margin-bottom: 8px; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-sub  { font-size: 11px; color: var(–muted); margin-top: 3px; }
.item-price { text-align: right; flex-shrink: 0; }
.item-sale-val   { font-size: 15px; font-weight: 700; }
.item-profit-val { font-size: 11px; color: var(–green); margin-top: 2px; }
.item-del { background: none; border: none; font-size: 18px; color: #ccc; cursor: pointer; padding: 4px; flex-shrink: 0; }

.tag { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 20px; margin-right: 4px; }
.tag-mercari { background: #ffe8ec; color: #e63262; }
.tag-rakuma  { background: #eeeaff; color: #6c5ce7; }
.tag-yahoo   { background: #fff0e0; color: #e67e00; }
.tag-paypay  { background: #e0f0ff; color: #0070cc; }
.tag-other   { background: #f0f0f0; color: #666; }

.empty { text-align: center; padding: 48px 20px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; color: var(–muted); line-height: 1.6; }

/* ── FORM ── */
.upload-area {
width: 100%; padding: 20px;
background: #f9f9fb; border: 2px dashed var(–border); border-radius: 12px;
display: flex; align-items: center; justify-content: center; gap: 10px;
font-size: 14px; font-weight: 600; color: var(–muted);
cursor: pointer; margin-bottom: 16px; transition: all 0.2s;
}
.upload-area.analyzing { border-color: var(–accent); color: var(–accent); background: #fff8f5; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #ffcbb5; border-top-color: var(–accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-group { margin-bottom: 10px; }
.form-label { font-size: 11px; font-weight: 700; color: var(–muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 11px 12px; background: var(–bg); border: 1px solid var(–border); border-radius: 10px; font-family: inherit; font-size: 15px; color: var(–text); outline: none; -webkit-appearance: none; appearance: none; }
.form-input:focus { border-color: var(–accent); background: #fff; }

.btn-save { display: block; width: 100%; padding: 15px; background: #ff6b35; color: #fff; border: none; border-radius: 12px; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; -webkit-appearance: none; }
.btn-save:active { opacity: 0.75; }
.btn-primary { display: block; width: 100%; padding: 14px; background: #ff6b35; color: #fff; border: none; border-radius: 11px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; -webkit-appearance: none; }
.btn-primary:active { opacity: 0.75; }

/* ── CHART ── */
.chart-wrap { position: relative; height: 220px; margin: 4px 0; }

/* ── SETTINGS ── */
.settings-link { color: var(–accent); text-decoration: none; font-size: 12px; }

/* ── TOAST ── */
.toast {
position: fixed;
bottom: calc(var(–nav-h) + env(safe-area-inset-bottom) + 12px);
left: 50%; transform: translateX(-50%) translateY(8px);
background: #333; color: #fff; border-radius: 10px;
padding: 10px 18px; font-size: 13px; font-weight: 600;
opacity: 0; transition: all 0.25s; pointer-events: none;
white-space: nowrap; z-index: 300;
max-width: calc(100vw - 40px); text-align: center;
}
.toast.error { background: #e63262; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── MODAL ── */
.modal { position: fixed; inset: 0; z-index: 400; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.35); opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.modal.show { opacity: 1; pointer-events: auto; }
.modal-inner { background: #fff; border-radius: 20px; padding: 36px 48px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); transform: scale(0.85); transition: transform 0.25s; }
.modal.show .modal-inner { transform: scale(1); }
</style>

</head>
<body>

<!-- SPLASH -->

<div class="splash" id="splash">
  <img src="splash.PNG" alt="">
</div>

<!-- HEADER -->

<header class="header">
  <img class="header-logo" src="logo.PNG" alt="決闘売上録">
  <span class="db-badge db-wait" id="db-status">接続中</span>
</header>

<!-- HOME -->

<div class="page active" id="page-home">
  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="month-label"></span>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="stats-grid">
    <div class="stat-card pink"><div class="stat-label">売上合計</div><div class="stat-value" id="total-sales">¥0</div></div>
    <div class="stat-card mint"><div class="stat-label">純利益</div><div class="stat-value" id="total-profit">¥0</div></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">手数料合計</div><div class="stat-value" id="total-fee">¥0</div></div>
    <div class="stat-card"><div class="stat-label">販売件数</div><div class="stat-value" id="month-count">0件</div></div>
  </div>
  <div class="card">
    <div class="section-label">アプリ別</div>
    <div id="app-breakdown"><div style="color:var(--muted);font-size:13px">データなし</div></div>
  </div>
  <div class="section-label" style="padding:0 4px">今月の販売記録</div>
  <div id="item-list">
    <div class="empty"><div class="empty-icon">📦</div><div class="empty-text">まだ記録がありません<br>＋から追加してね</div></div>
  </div>
</div>

<!-- ADD -->

<div class="page" id="page-add">
  <div class="card">
    <div class="section-label" style="margin-bottom:12px">📸 取引画像から自動入力</div>
    <div class="upload-area" id="upload-area" onclick="document.getElementById('img-input').click()">
      <span id="upload-icon">📷</span>
      <span id="upload-text">取引スクショをタップして選択</span>
    </div>
    <input type="file" accept="image/*" id="img-input" style="display:none" onchange="handleImage(event)">
  </div>
  <div class="card">
    <div class="form-group">
      <label class="form-label">商品名</label>
      <input class="form-input" id="f-name" type="text" placeholder="例：遊戯王 ゴーズトークン" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="form-row">
      <div>
        <label class="form-label">購入日時</label>
        <input class="form-input" id="f-date" type="text" placeholder="2026/03/14" autocomplete="off" inputmode="numeric">
      </div>
      <div>
        <label class="form-label">フリマアプリ</label>
        <select class="form-input" id="f-app" autocomplete="off">
          <option>メルカリ</option><option>ラクマ</option><option>ヤフオク</option><option>PayPayフリマ</option><option>その他</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div><label class="form-label">商品代金（円）</label><input class="form-input" id="f-price" type="number" placeholder="0" autocomplete="off"></div>
      <div><label class="form-label">販売手数料（円）</label><input class="form-input" id="f-fee" type="number" placeholder="0" autocomplete="off"></div>
    </div>
    <div class="form-row">
      <div><label class="form-label">配送料（円）</label><input class="form-input" id="f-shipping" type="number" placeholder="0" autocomplete="off"></div>
      <div><label class="form-label">販売利益（円）</label><input class="form-input" id="f-profit" type="number" placeholder="0" autocomplete="off"></div>
    </div>
    <div class="form-row">
      <div><label class="form-label">仕入れ値（円）</label><input class="form-input" id="f-cost" type="number" placeholder="0" autocomplete="off"></div>
      <div><label class="form-label">配送方法</label><input class="form-input" id="f-delivery" type="text" placeholder="ゆうゆうメルカリ便" autocomplete="off"></div>
    </div>
    <div class="form-group">
      <label class="form-label">商品ID</label>
      <input class="form-input" id="f-item-id" type="text" placeholder="m12345..." autocomplete="off">
    </div>
    <button class="btn-save" onclick="saveItem()">Supabaseに保存する</button>
  </div>
</div>

<!-- CHART -->

<div class="page" id="page-chart">
  <div class="card">
    <div class="section-label">月別売上グラフ</div>
    <div class="chart-wrap"><canvas id="sales-chart"></canvas></div>
  </div>
</div>

<!-- SETTINGS -->

<div class="page" id="page-settings">
  <div class="card">
    <div class="section-label" style="margin-bottom:12px">Supabase 接続設定</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">URLとAPIキーを入力してください。一度設定すればこのデバイスに保存されます。</p>
    <div class="form-group">
      <label class="form-label">Project URL</label>
      <input class="form-input" id="s-url" type="text" placeholder="https://xxxx.supabase.co" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Publishable (anon) Key</label>
      <input class="form-input" id="s-key" type="text" placeholder="sb_publishable_..." autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Gemini API Key（画像解析用）</label>
      <input class="form-input" id="s-gemini" type="password" placeholder="AIza..." autocomplete="off">
      <div style="margin-top:6px"><a class="settings-link" href="https://aistudio.google.com/apikey" target="_blank">→ Google AI Studioで無料取得</a></div>
    </div>
    <button class="btn-primary" onclick="saveSettings()">設定を保存する</button>
  </div>
  <div class="card">
    <div class="section-label" style="margin-bottom:8px">DB情報</div>
    <div style="font-size:13px;color:var(--muted)">
      <div id="settings-url" style="word-break:break-all;margin-bottom:4px"></div>
      <div id="settings-count">件数：-</div>
    </div>
  </div>
</div>

<!-- NAV -->

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('home',this)"><span class="nav-icon">🏠</span>ホーム</button>
  <button class="nav-btn" onclick="showPage('add',this)"><span class="nav-icon">＋</span>追加</button>
  <button class="nav-btn" onclick="showPage('chart',this)"><span class="nav-icon">📊</span>グラフ</button>
  <button class="nav-btn" onclick="showPage('settings',this)"><span class="nav-icon">⚙️</span>設定</button>
</nav>

<div class="toast" id="toast"></div>
<div id="done-modal" class="modal">
  <div class="modal-inner">
    <div style="font-size:36px;margin-bottom:8px">✅</div>
    <div style="font-size:16px;font-weight:700">解析完了！</div>
    <div style="font-size:13px;color:#8e8e93;margin-top:4px">内容を確認してください</div>
  </div>
</div>

<script>
// ── Supabase ──
let _sb = null;
function getClient() {
  const url = (localStorage.getItem('sb_url') || '').replace(/\/$/, '');
  const key = localStorage.getItem('sb_key') || '';
  if (!url || !key) return null;
  if (!_sb) _sb = window.supabase.createClient(url, key);
  return _sb;
}
async function dbGetAll() {
  const c = getClient(); if (!c) throw new Error('未設定');
  const { data, error } = await c.from('items').select('*').order('date', { ascending: false });
  if (error) throw error;
  return data;
}
async function dbInsert(item) {
  const c = getClient(); if (!c) throw new Error('未設定');
  const { error } = await c.from('items').insert(item);
  if (error) throw error;
}
async function dbDelete(id) {
  const c = getClient(); if (!c) throw new Error('未設定');
  const { error } = await c.from('items').delete().eq('id', id);
  if (error) throw error;
}

// ── State ──
let curYear = new Date().getFullYear(), curMonth = new Date().getMonth() + 1;
let chartInst = null;
const fmt = n => '¥' + Math.round(n).toLocaleString('ja-JP');

// ── Toast ──
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || 'success') + ' show';
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.classList.remove('show'); }, 2800);
}

// ── Nav ──
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'home')     renderHome();
  if (name === 'chart')    renderChart();
  if (name === 'settings') renderSettings();
}

function changeMonth(d) {
  curMonth += d;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  if (curMonth < 1)  { curMonth = 12; curYear--; }
  renderHome();
}

// ── Home ──
async function renderHome() {
  document.getElementById('month-label').textContent = curYear + '年' + curMonth + '月';
  const st = document.getElementById('db-status');
  st.textContent = '接続中'; st.className = 'db-badge db-wait';
  try {
    const all = await dbGetAll();
    const mi = all.filter(function(i) {
      const d = new Date(i.date);
      return d.getFullYear() === curYear && d.getMonth() + 1 === curMonth;
    });
    document.getElementById('total-sales').textContent  = fmt(mi.reduce(function(s,i){return s+(+i.price||0);},0));
    document.getElementById('total-profit').textContent = fmt(mi.reduce(function(s,i){return s+(+i.profit||0);},0));
    document.getElementById('total-fee').textContent    = fmt(mi.reduce(function(s,i){return s+(+i.fee_amount||0);},0));
    document.getElementById('month-count').textContent  = mi.length + '件';

    const appMap = {};
    mi.forEach(function(i) {
      if (!appMap[i.app]) appMap[i.app] = {sales:0,profit:0};
      appMap[i.app].sales  += +i.price||0;
      appMap[i.app].profit += +i.profit||0;
    });
    const bd = document.getElementById('app-breakdown');
    if (Object.keys(appMap).length) {
      bd.innerHTML = Object.entries(appMap).map(function(e) {
        return '<div class="app-row"><div style="font-size:14px;font-weight:600">' + e[0] + '</div><div style="text-align:right"><div style="font-size:14px;font-weight:700">' + fmt(e[1].sales) + '</div><div style="font-size:11px;color:var(--green)">利益 ' + fmt(e[1].profit) + '</div></div></div>';
      }).join('');
    } else {
      bd.innerHTML = '<div style="color:var(--muted);font-size:13px">データなし</div>';
    }

    const listEl = document.getElementById('item-list');
    if (!mi.length) {
      listEl.innerHTML = '<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">まだ記録がありません<br>＋から追加してね</div></div>';
    } else {
      listEl.innerHTML = mi.map(function(i) {
        const tagCls = {メルカリ:'tag-mercari',ラクマ:'tag-rakuma',ヤフオク:'tag-yahoo','PayPayフリマ':'tag-paypay'}[i.app]||'tag-other';
        const d = new Date(i.date);
        return '<div class="item-card"><div class="item-info"><div class="item-name">' + i.name + '</div><div class="item-sub"><span class="tag '+tagCls+'">' + i.app + '</span>' + (d.getMonth()+1) + '/' + d.getDate() + '</div></div><div class="item-price"><div class="item-sale-val">' + fmt(+i.price||0) + '</div><div class="item-profit-val">+' + fmt(+i.profit||0) + '</div></div><button class="item-del" onclick="deleteItem(\''+i.id+'\')">🗑</button></div>';
      }).join('');
    }
    st.textContent = 'DB ✓'; st.className = 'db-badge db-ok';
  } catch(e) {
    st.textContent = 'エラー'; st.className = 'db-badge db-err';
    document.getElementById('item-list').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">接続エラー<br>⚙️設定を確認してください</div></div>';
  }
}

async function deleteItem(id) {
  if (!confirm('この記録を削除しますか？')) return;
  try { await dbDelete(id); renderHome(); toast('削除しました'); }
  catch(e) { toast('削除に失敗しました', 'error'); }
}

// ── Image Analysis ──
async function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  const geminiKey = localStorage.getItem('gemini_key') || '';
  if (!geminiKey) { toast('⚙️設定からGemini APIキーを入力してください', 'error'); return; }

  const area = document.getElementById('upload-area');
  area.classList.add('analyzing');
  document.getElementById('upload-icon').innerHTML = '<span class="spinner"></span>';
  document.getElementById('upload-text').textContent = 'AI解析中...';

  try {
    const jpegBase64 = await new Promise(function(res, rej) {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const max = 1200;
        let w = img.width, h = img.height;
        if (w > max || h > max) {
          if (w > h) { h = Math.round(h*max/w); w = max; }
          else { w = Math.round(w*max/h); h = max; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        res(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
      };
      img.onerror = function() { rej(new Error('画像読み込み失敗')); };
      img.src = url;
    });

    let data;
    for (let attempt = 1; attempt <= 3; attempt++) {
      if (attempt > 1) {
        document.getElementById('upload-text').textContent = '再試行中... (' + attempt + '/3)';
        await new Promise(function(r) { setTimeout(r, 3000 * attempt); });
      }
      const res = await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + geminiKey,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [
              { inline_data: { mime_type: 'image/jpeg', data: jpegBase64 } },
              { text: 'これはフリマアプリの取引画面です。JSONのみ返してください。{"name":"商品名","date":"YYYY-MM-DD","app":"メルカリ","price":数値,"fee_amount":数値,"shipping":数値,"profit":数値,"delivery_method":"配送方法","item_id":"商品ID"} 不明はnull。' }
            ]}],
            generationConfig: { temperature: 0, maxOutputTokens: 500 }
          })
        }
      );
      data = await res.json();
      if (!data.error) break;
      if (data.error.code === 429 && attempt < 3) continue;
      throw new Error('APIエラー: ' + data.error.message);
    }

    if (!data.candidates || !data.candidates[0]) throw new Error('レスポンス空');
    const rawText = data.candidates[0].content.parts[0].text;
    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('JSON解析失敗');
    const p = JSON.parse(jsonMatch[0]);

    if (p.name)            document.getElementById('f-name').value     = p.name;
    if (p.date)            document.getElementById('f-date').value     = p.date.replace(/-/g, '/');
    if (p.app) {
      const keys = ['メルカリ','ラクマ','ヤフオク','PayPayフリマ'];
      document.getElementById('f-app').value = keys.find(function(k){return p.app.includes(k);}) || 'メルカリ';
    }
    if (p.price != null)      document.getElementById('f-price').value    = p.price;
    if (p.fee_amount != null) document.getElementById('f-fee').value      = p.fee_amount;
    if (p.shipping != null)   document.getElementById('f-shipping').value = p.shipping;
    if (p.profit != null)     document.getElementById('f-profit').value   = p.profit;
    if (p.delivery_method)    document.getElementById('f-delivery').value = p.delivery_method;
    if (p.item_id)            document.getElementById('f-item-id').value  = p.item_id;

    const modal = document.getElementById('done-modal');
    modal.classList.add('show');
    setTimeout(function() { modal.classList.remove('show'); }, 2500);

  } catch(err) {
    const m = err.message || '不明なエラー';
    if (m.includes('quota') || m.includes('RESOURCE_EXHAUSTED') || m.includes('429')) {
      toast('レート制限中。しばらく待ってから再試行してください', 'error');
    } else {
      toast('解析失敗: ' + m.slice(0, 60), 'error');
    }
  } finally {
    area.classList.remove('analyzing');
    document.getElementById('upload-icon').textContent = '📷';
    document.getElementById('upload-text').textContent = '取引スクショをタップして選択';
  }
}

// ── Save Item ──
async function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('商品名を入力してください', 'error'); return; }
  const item = {
    id: Date.now().toString(),
    name: name,
    date: document.getElementById('f-date').value.replace(/\//g, '-'),
    app:  document.getElementById('f-app').value,
    price:           +document.getElementById('f-price').value    || 0,
    fee_amount:      +document.getElementById('f-fee').value      || 0,
    shipping:        +document.getElementById('f-shipping').value || 0,
    profit:          +document.getElementById('f-profit').value   || 0,
    cost:            +document.getElementById('f-cost').value     || 0,
    delivery_method: document.getElementById('f-delivery').value,
    item_id:         document.getElementById('f-item-id').value,
  };
  try {
    await dbInsert(item);
    toast('✅ 保存しました！');
    ['f-name','f-price','f-fee','f-shipping','f-profit','f-cost','f-delivery','f-item-id'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
    const t = new Date();
    document.getElementById('f-date').value = t.getFullYear() + '/' + String(t.getMonth()+1).padStart(2,'0') + '/' + String(t.getDate()).padStart(2,'0');
  } catch(e) { toast('保存失敗: ' + e.message, 'error'); }
}

// ── Chart ──
async function renderChart() {
  try {
    const all = await dbGetAll();
    const monthly = {};
    all.forEach(function(i) {
      const d = new Date(i.date);
      const key = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0');
      if (!monthly[key]) monthly[key] = {sales:0,profit:0};
      monthly[key].sales  += +i.price||0;
      monthly[key].profit += +i.profit||0;
    });
    const labels = Object.keys(monthly).sort().slice(-6);
    const ctx = document.getElementById('sales-chart').getContext('2d');
    if (chartInst) chartInst.destroy();
    chartInst = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          { label:'売上', data: labels.map(function(k){return monthly[k].sales;}),  backgroundColor:'rgba(255,107,53,0.7)' },
          { label:'利益', data: labels.map(function(k){return monthly[k].profit;}), backgroundColor:'rgba(6,214,160,0.7)' }
        ]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'top' } } }
    });
  } catch(e) { toast('グラフ取得失敗', 'error'); }
}

// ── Settings ──
function saveSettings() {
  const url    = document.getElementById('s-url').value.trim();
  const key    = document.getElementById('s-key').value.trim();
  const gemini = document.getElementById('s-gemini').value.trim();
  if (!url || !key) { toast('URLとキーを入力してください', 'error'); return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  if (gemini) localStorage.setItem('gemini_key', gemini);
  _sb = null;
  toast('✅ 設定を保存しました');
  renderSettings();
  renderHome();
}
async function renderSettings() {
  document.getElementById('s-url').value    = localStorage.getItem('sb_url')    || '';
  document.getElementById('s-key').value    = localStorage.getItem('sb_key')    || '';
  document.getElementById('s-gemini').value = localStorage.getItem('gemini_key')|| '';
  document.getElementById('settings-url').textContent = localStorage.getItem('sb_url') || '未設定';
  try {
    const all = await dbGetAll();
    document.getElementById('settings-count').textContent = '件数：' + all.length + ' 件';
  } catch { document.getElementById('settings-count').textContent = '件数：接続エラー'; }
}

// ── Init ──
const _now = new Date();
document.getElementById('f-date').value = _now.getFullYear() + '/' + String(_now.getMonth()+1).padStart(2,'0') + '/' + String(_now.getDate()).padStart(2,'0');
renderHome();

// Splash
setTimeout(function() {
  const s = document.getElementById('splash');
  s.classList.add('hide');
  setTimeout(function() { s.remove(); }, 800);
}, 2200);
</script>
