<title>フリマ売上管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
–bg: #0f0e11;
–surface: #1a1820;
–surface2: #242130;
–accent: #ff6b35;
–accent2: #ffd166;
–green: #06d6a0;
–text: #f0edf5;
–muted: #7b7490;
–border: #2e2a3a;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Zen Kaku Gothic New’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
min-height: 100dvh;
padding-bottom: calc(80px + env(safe-area-inset-bottom));
}

.header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 16px 20px;
padding-top: calc(16px + env(safe-area-inset-top));
position: sticky; top: 0; z-index: 100;
display: flex; align-items: center; justify-content: space-between;
}
.header-title { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
.header-title span { color: var(–accent); }

.nav {
position: fixed; bottom: 0; left: 0; right: 0;
background: var(–surface);
border-top: 1px solid var(–border);
display: flex; z-index: 100;
padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
flex: 1; padding: 12px 4px 8px;
background: none; border: none; color: var(–muted);
font-family: inherit; font-size: 10px;
display: flex; flex-direction: column; align-items: center; gap: 4px;
cursor: pointer; transition: color 0.2s;
}
.nav-btn.active { color: var(–accent); }
.nav-icon { font-size: 20px; line-height: 1; }

.page { display: none; padding: 20px; }
.page.active { display: block; }

.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 16px;
margin-bottom: 12px;
}

.summary-grid {
display: grid; grid-template-columns: 1fr 1fr;
gap: 10px; margin-bottom: 16px;
}
.summary-card {
background: var(–surface); border: 1px solid var(–border);
border-radius: 14px; padding: 14px;
}
.summary-card.accent { border-color: var(–accent); background: rgba(255,107,53,0.08); }
.summary-card.green  { border-color: var(–green);  background: rgba(6,214,160,0.08); }
.summary-label { font-size: 10px; color: var(–muted); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
.summary-value { font-family: ‘DM Mono’, monospace; font-size: 20px; font-weight: 500; letter-spacing: -1px; }
.summary-card.accent .summary-value { color: var(–accent); }
.summary-card.green  .summary-value { color: var(–green); }

.month-selector {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 16px;
background: var(–surface); border: 1px solid var(–border);
border-radius: 12px; padding: 10px 14px;
}
.month-btn { background: none; border: none; color: var(–text); font-size: 20px; cursor: pointer; padding: 0 8px; }
.month-label { font-weight: 700; font-size: 16px; }

.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; color: var(–muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.form-input, .form-select {
width: 100%;
background: var(–surface2); border: 1px solid var(–border);
border-radius: 10px; padding: 12px 14px;
color: var(–text); font-family: inherit; font-size: 16px;
outline: none; transition: border-color 0.2s; -webkit-appearance: none;
}
.form-input:focus, .form-select:focus { border-color: var(–accent); }
.form-select option { background: var(–surface2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn-primary {
width: 100%; background: var(–accent); color: #fff;
border: none; border-radius: 12px; padding: 14px;
font-family: inherit; font-size: 16px; font-weight: 700;
cursor: pointer; transition: opacity 0.2s, transform 0.1s;
}
.btn-primary:active { opacity: 0.8; transform: scale(0.98); }
.btn-secondary {
background: var(–surface2); color: var(–text);
border: 1px solid var(–border); border-radius: 10px;
padding: 10px 16px; font-family: inherit; font-size: 13px;
cursor: pointer; display: block; width: 100%; text-align: center;
}

/* 画像アップロードエリア */
.upload-area {
border: 2px dashed var(–border);
border-radius: 14px;
padding: 28px 20px;
text-align: center;
cursor: pointer;
transition: border-color 0.2s, background 0.2s;
margin-bottom: 14px;
position: relative;
}
.upload-area:hover, .upload-area.dragover { border-color: var(–accent); background: rgba(255,107,53,0.05); }
.upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-icon { font-size: 32px; margin-bottom: 8px; }
.upload-text { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.upload-sub { font-size: 11px; color: var(–muted); }

.preview-img {
width: 100%; border-radius: 10px; margin-bottom: 14px;
border: 1px solid var(–border); display: none;
}

/* AI解析中 */
.analyzing {
display: none;
align-items: center; justify-content: center; gap: 10px;
padding: 16px; background: rgba(255,107,53,0.08);
border: 1px solid var(–accent); border-radius: 12px;
margin-bottom: 14px; font-size: 14px; font-weight: 700; color: var(–accent);
}
.analyzing.active { display: flex; }
@keyframes spin { to { transform: rotate(360deg); } }

<script>
// ======== Supabase SDK ========
let _supabase = null;

function getClient() {
  const url = (localStorage.getItem('sb_url') || '').replace(/\/$/, '');
  const key = localStorage.getItem('sb_key') || '';
  if (!url || !key) return null;
  if (!_supabase) {
    _supabase = window.supabase.createClient(url, key);
  }
  return _supabase;
}

async function dbGetAll() {
  const client = getClient();
  if (!client) throw new Error('未設定');
  const { data, error } = await client.from('items').select('*').order('date', { ascending: false });
  if (error) throw error;
  return data;
}

async function dbInsert(item) {
  const client = getClient();
  if (!client) throw new Error('未設定');
  const { error } = await client.from('items').insert(item);
  if (error) throw error;
}

async function dbDelete(id) {
  const client = getClient();
  if (!client) throw new Error('未設定');
  const { error } = await client.from('items').delete().eq('id', id);
  if (error) throw error;
}

// ======== State ========
let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth() + 1;
let chartInstance = null;
const fmt = n => '¥' + Math.round(n).toLocaleString('ja-JP');

// ======== Toast ========
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ======== Nav ========
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'home') renderHome();
}

function changeMonth(d) {
  currentMonth += d;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
  renderHome();
}

// ======== Home ========
async function renderHome() {
  document.getElementById('month-label').textContent = `${currentYear}年${currentMonth}月`;
  document.getElementById('db-status').textContent = '接続中';
  document.getElementById('db-status').className = 'db-status db-ok';
  try {
    const all = await dbGetAll();
    const mi = all.filter(i => {
      const d = new Date(i.date);
      return d.getFullYear() === currentYear && d.getMonth() + 1 === currentMonth;
    });

    document.getElementById('total-sales').textContent  = fmt(mi.reduce((s,i)=>s+(i.price||0),0));
    document.getElementById('total-profit').textContent = fmt(mi.reduce((s,i)=>s+(i.profit||0),0));
    document.getElementById('total-fee').textContent    = fmt(mi.reduce((s,i)=>s+(i.fee_amount||0),0));
    document.getElementById('month-count').textContent  = mi.length + '件';

    const appMap = {};
    mi.forEach(i => {
      if (!appMap[i.app]) appMap[i.app] = {sales:0, profit:0};
      appMap[i.app].sales  += i.price || 0;
      appMap[i.app].profit += i.profit || 0;
    });
    const bd = document.getElementById('app-breakdown');
    bd.innerHTML = Object.keys(appMap).length
      ? Object.entries(appMap).map(([app,s])=>`<div class="app-row"><div class="app-name">${app}</div><div class="app-stats"><div class="app-sale">${fmt(s.sales)}</div><div class="app-profit">利益 ${fmt(s.profit)}</div></div></div>`).join('')
      : '<div style="color:var(--muted);font-size:13px;padding:8px 0">データなし</div>';

    const listEl = document.getElementById('item-list');
    if (!mi.length) {
      listEl.innerHTML = '<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">まだ記録がありません<br>＋から追加してね</div></div>';
      return;
    }
    listEl.innerHTML = mi.map(i => {
      const cls = i.app==='メルカリ'?'tag-mercari':i.app==='ラクマ'?'tag-rakuma':'tag-other';
      const d = new Date(i.date);
      return `<div class="item-card">
        <div class="item-info">
          <div class="item-name">${i.name}</div>
          <div class="item-meta"><span class="app-badge tag ${cls}">${i.app}</span><span>${d.getMonth()+1}/${d.getDate()}</span></div>
        </div>
        <div class="item-prices">
          <div class="item-sale">${fmt(i.price||0)}</div>
          <div class="item-profit">+${fmt(i.profit||0)}</div>
        </div>
        <button class="item-delete" onclick="deleteItem('${i.id}')">🗑</button>
      </div>`;
    }).join('');

    document.getElementById('db-status').textContent = 'DB ✓';
    document.getElementById('db-status').className = 'db-status db-ok';
  } catch(e) {
    document.getElementById('db-status').textContent = 'DB エラー';
    document.getElementById('db-status').className = 'db-status db-err';
    document.getElementById('item-list').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">接続エラー<br>⚙️設定からURLとキーを確認してね</div></div>';
  }
}

// ======== 画像解析 ========
async function handleImage(e) {
  const file = e.target.files[0]; if (!file) return;

  // プレビュー
  const preview = document.getElementById('preview-img');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';

  // アップロードエリアのテキスト更新
  document.querySelector('.upload-text').textContent = '画像を選択済み';
  document.querySelector('.upload-icon').textContent = '✅';

  // Base64変換
  const base64 = await new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.readAsDataURL(file);
  });

  // AI解析開始
  document.getElementById('analyzing').classList.add('active');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: file.type, data: base64 }
            },
            {
              type: 'text',
              text: `この取引画面の画像から以下の情報をJSONで抽出してください。
JSONのみ返してください。マークダウンや説明文は不要です。

{
  "name": "商品名",
  "date": "YYYY-MM-DD形式の購入日",
  "app": "メルカリ/ラクマ/ヤフオク/PayPayフリマ/その他",
  "price": 商品代金の数値,
  "fee_amount": 販売手数料の数値,
  "shipping": 配送料の数値,
  "profit": 販売利益の数値,
  "delivery_method": "配送方法",
  "item_id": "商品ID"
}

値が不明な場合は null にしてください。`
            }
          ]
        }]
      })
    });

    const data = await res.json();
    const text = data.content.map(c => c.text || '').join('');
    const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());

    // フォームに自動入力
    if (parsed.name)            document.getElementById('f-name').value     = parsed.name;
    if (parsed.date)            document.getElementById('f-date').value     = parsed.date;
    if (parsed.app)             document.getElementById('f-app').value      = parsed.app;
    if (parsed.price != null)   document.getElementById('f-price').value    = parsed.price;
    if (parsed.fee_amount != null) document.getElementById('f-fee').value   = parsed.fee_amount;
    if (parsed.shipping != null) document.getElementById('f-shipping').value = parsed.shipping;
    if (parsed.profit != null)  document.getElementById('f-profit').value   = parsed.profit;
    if (parsed.delivery_method) document.getElementById('f-delivery').value = parsed.delivery_method;
    if (parsed.item_id)         document.getElementById('f-item-id').value  = parsed.item_id;

    toast('✅ 解析完了！内容を確認してね');
  } catch(err) {
    toast('解析に失敗しました。手動で入力してください', 'error');
    console.error(err);
  } finally {
    document.getElementById('analyzing').classList.remove('active');
  }
}

// ======== 追加 ========
async function addItem() {
  const name = document.getElementById('f-name').value.trim();
  const date = document.getElementById('f-date').value;
  const app  = document.getElementById('f-app').value;
  const price = parseFloat(document.getElementById('f-price').value) || 0;

  if (!name) { toast('商品名を入力してください', 'error'); return; }
  if (!date) { toast('日付を入力してください', 'error'); return; }
  if (!price) { toast('商品代金を入力してください', 'error'); return; }

  const item = {
    id: Date.now().toString(),
    name, date, app, price,
    fee_amount: parseFloat(document.getElementById('f-fee').value) || 0,
    shipping:   parseFloat(document.getElementById('f-shipping').value) || 0,
    profit:     parseFloat(document.getElementById('f-profit').value) || 0,
    cost:       parseFloat(document.getElementById('f-cost').value) || 0,
    delivery_method: document.getElementById('f-delivery').value || null,
    item_id: document.getElementById('f-item-id').value || null,
  };

  try {
    await dbInsert(item);
    // フォームリセット
    ['f-name','f-price','f-fee','f-shipping','f-profit','f-cost','f-delivery','f-item-id'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('preview-img').style.display = 'none';
    document.querySelector('.upload-text').textContent = '取引画面のスクショをアップ';
    document.querySelector('.upload-icon').textContent = '📷';
    document.getElementById('img-input').value = '';

    const d = new Date(date);
    currentYear = d.getFullYear(); currentMonth = d.getMonth() + 1;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-home').classList.add('active');
    showPage('home', document.getElementById('nav-home'));
    toast('✅ 保存しました！');
  } catch(e) {
    toast('保存に失敗しました', 'error');
    console.error(e);
  }
}

async function deleteItem(id) {
  if (!confirm('この記録を削除しますか？')) return;
  try { await dbDelete(id); renderHome(); toast('削除しました'); }
  catch(e) { toast('削除に失敗しました', 'error'); }
}

// ======== Chart ========
async function renderChart() {
  try {
    const all = await dbGetAll();
    const now = new Date();
    const months = Array.from({length:12},(_,i)=>{ const d=new Date(now.getFullYear(),now.getMonth()-(11-i),1); return {year:d.getFullYear(),month:d.getMonth()+1}; });
    const filter = m => all.filter(i=>{ const d=new Date(i.date); return d.getFullYear()===m.year&&d.getMonth()+1===m.month; });
    const sales   = months.map(m=>filter(m).reduce((s,i)=>s+(i.price||0),0));
    const profits = months.map(m=>filter(m).reduce((s,i)=>s+(i.profit||0),0));
    if (chartInstance) { chartInstance.destroy(); chartInstance=null; }
    chartInstance = new Chart(document.getElementById('monthly-chart').getContext('2d'), {
      type:'bar',
      data:{ labels:months.map(m=>`${m.month}月`), datasets:[
        {label:'売上',   data:sales,   backgroundColor:'rgba(255,107,53,0.7)',borderRadius:6,borderSkipped:false},
        {label:'純利益', data:profits, backgroundColor:'rgba(6,214,160,0.7)', borderRadius:6,borderSkipped:false}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#f0edf5',font:{size:11}}},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.parsed.y)}}},
        scales:{x:{ticks:{color:'#7b7490',font:{size:10}},grid:{color:'#2e2a3a'}},y:{ticks:{color:'#7b7490',font:{size:10},callback:v=>'¥'+v.toLocaleString()},grid:{color:'#2e2a3a'}}}}
    });
    const rows = months.map((m,i)=>({m,s:sales[i],p:profits[i],cnt:filter(m).length})).filter(r=>r.s>0||r.p>0).reverse();
    document.getElementById('monthly-table').innerHTML = rows.length
      ? rows.map(r=>`<div class="app-row"><div><div class="app-name">${r.m.year}年${r.m.month}月</div><div style="font-size:11px;color:var(--muted)">${r.cnt}件</div></div><div class="app-stats"><div class="app-sale">${fmt(r.s)}</div><div class="app-profit">利益 ${fmt(r.p)}</div></div></div>`).join('')
      : '<div style="color:var(--muted);font-size:13px;padding:8px 0">データなし</div>';
  } catch(e) { console.error(e); }
}

// ======== Settings ========
function saveSettings() {
  const url = document.getElementById('s-url').value.trim();
  const key = document.getElementById('s-key').value.trim();
  if (!url || !key) { toast('URLとキーを両方入力してください', 'error'); return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  _supabase = null; // reset client
  toast('✅ 設定を保存しました！');
  renderSettings();
  renderHome();
}

async function renderSettings() {
  const url = localStorage.getItem('sb_url') || '';
  document.getElementById('s-url').value = url;
  document.getElementById('s-key').value = localStorage.getItem('sb_key') || '';
  document.getElementById('settings-url').textContent = url || '未設定';
  try {
    const all = await dbGetAll();
    document.getElementById('settings-count').textContent = `件数：${all.length} 件`;
  } catch { document.getElementById('settings-count').textContent = '件数：接続エラー'; }
}

// ======== Init ========
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
const savedUrl = localStorage.getItem('sb_url');
const savedKey = localStorage.getItem('sb_key');
if (!savedUrl || savedUrl === 'YOUR_SUPABASE_URL') {
  // 未設定なら設定ページに誘導
  document.getElementById('db-status').textContent = '要設定';
  document.getElementById('db-status').className = 'db-status db-err';
  document.getElementById('item-list').innerHTML = '<div class="empty"><div class="empty-icon">⚙️</div><div class="empty-text">まず⚙️設定からSupabaseの<br>URLとキーを入力してね</div></div>';
} else {
  renderHome();
}
</script>
